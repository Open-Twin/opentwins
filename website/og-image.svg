<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0e1320"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="1199" height="629" rx="0" fill="none" stroke="#283548" stroke-width="1"/>

  <!-- Logo badge -->
  <rect x="80" y="80" width="52" height="52" rx="12" fill="#2dd4bf" fill-opacity="0.1" stroke="#0d9488" stroke-opacity="0.4"/>
  <text x="106" y="114" font-family="monospace" font-size="22" font-weight="bold" fill="#2dd4bf" text-anchor="middle">OT</text>

  <!-- Brand name -->
  <text x="148" y="114" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#e2e8f0" letter-spacing="2">OPENTWINS</text>

  <!-- Headline -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Grow your presence.</text>
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#accent)" letter-spacing="-1">Not your workload.</text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94a3b8">AI agents that engage on LinkedIn, Twitter, Reddit and 7 more</text>
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94a3b8">platforms - as you, in your voice.</text>

  <!-- Platform dots -->
  <circle cx="80" cy="480" r="6" fill="#0A66C2"/>
  <text x="96" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">LinkedIn</text>

  <circle cx="195" cy="480" r="6" fill="#1DA1F2"/>
  <text x="211" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Twitter</text>

  <circle cx="295" cy="480" r="6" fill="#FF4500"/>
  <text x="311" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Reddit</text>

  <circle cx="388" cy="480" r="6" fill="#0085FF"/>
  <text x="404" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Bluesky</text>

  <circle cx="485" cy="480" r="6" fill="#00AB6C"/>
  <text x="501" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Medium</text>

  <circle cx="580" cy="480" r="6" fill="#3B49DF"/>
  <text x="596" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">Dev.to</text>

  <circle cx="660" cy="480" r="6" fill="#64748b"/>
  <text x="676" y="485" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#64748b">+4 more</text>

  <!-- Bottom bar -->
  <rect x="80" y="540" width="1040" height="1" fill="#283548"/>
  <text x="80" y="575" font-family="monospace" font-size="14" fill="#2dd4bf">opentwins.ai</text>
  <text x="1120" y="575" font-family="monospace" font-size="14" fill="#475569" text-anchor="end">Open Source - MIT License</text>

  <!-- Right side decorative element - mini dashboard mockup -->
  <rect x="820" y="140" width="300" height="200" rx="12" fill="#151d2e" stroke="#283548"/>
  <rect x="820" y="140" width="300" height="32" rx="12" fill="#1e293b"/>
  <circle cx="838" cy="156" r="4" fill="#f87171" fill-opacity="0.5"/>
  <circle cx="852" cy="156" r="4" fill="#fbbf24" fill-opacity="0.5"/>
  <circle cx="866" cy="156" r="4" fill="#34d399" fill-opacity="0.5"/>

  <!-- Mini KPI cards -->
  <rect x="832" y="184" width="85" height="50" rx="6" fill="#0e1320" stroke="#1e293b"/>
  <text x="842" y="200" font-family="monospace" font-size="8" fill="#475569">AGENTS</text>
  <text x="842" y="222" font-family="monospace" font-size="18" font-weight="bold" fill="#2dd4bf">4/4</text>

  <rect x="925" y="184" width="85" height="50" rx="6" fill="#0e1320" stroke="#1e293b"/>
  <text x="935" y="200" font-family="monospace" font-size="8" fill="#475569">RUNS</text>
  <text x="935" y="222" font-family="monospace" font-size="18" font-weight="bold" fill="#34d399">18</text>

  <rect x="1018" y="184" width="85" height="50" rx="6" fill="#0e1320" stroke="#1e293b"/>
  <text x="1028" y="200" font-family="monospace" font-size="8" fill="#475569">COST</text>
  <text x="1028" y="222" font-family="monospace" font-size="18" font-weight="bold" fill="#2dd4bf">$8.42</text>

  <!-- Mini agent cards -->
  <rect x="832" y="244" width="130" height="36" rx="6" fill="#0e1320" stroke="#1e293b"/>
  <circle cx="846" cy="262" r="4" fill="#0A66C2"/>
  <text x="856" y="266" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">LinkedIn</text>
  <text x="938" y="266" font-family="monospace" font-size="8" fill="#34d399">DONE</text>

  <rect x="832" y="286" width="130" height="36" rx="6" fill="#0e1320" stroke="#1e293b"/>
  <circle cx="846" cy="304" r="4" fill="#1DA1F2"/>
  <text x="856" y="308" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">Twitter</text>
  <text x="938" y="308" font-family="monospace" font-size="8" fill="#60a5fa">LIVE</text>

  <!-- Live dot -->
  <circle cx="1090" y="156" r="4" fill="#2dd4bf">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
