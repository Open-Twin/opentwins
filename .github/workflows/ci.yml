name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # Cache both lockfiles so the client install doesn't try to use a
          # cache populated only with root's packages.
          cache-dependency-path: |
            package-lock.json
            src/ui/client/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install client dependencies
        # `npm ci` here triggers the well-known "Exit handler never called!"
        # hang on Ubuntu Node 22/24 (npm/cli #4769, #8074). Plain `npm install`
        # uses a different exit path that doesn't reproduce the bug.
        working-directory: src/ui/client
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
