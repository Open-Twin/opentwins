name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Split into two named steps so we can tell which install is hanging
      # in the recurring "Exit handler never called!" npm bug (#4769, #8074).
      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install client dependencies
        # `npm ci` here triggers the well-known "Exit handler never called!"
        # hang on Ubuntu Node 22/24 (npm/cli #4769, #8074) — likely esbuild's
        # postinstall + npm's exit cleanup interacting badly. `npm install`
        # uses a different exit path and doesn't reproduce. Lockfile is still
        # respected since it exists.
        working-directory: src/ui/client
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build
        run: npm run build

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
