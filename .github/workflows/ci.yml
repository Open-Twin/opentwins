name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        # --no-audit and --no-fund avoid a recurring npm bug where the
        # process hangs after install and dies with "Exit handler never
        # called!" (see npm/cli issues #4769, #8074). Audit still runs
        # against the lockfile via `npm audit signatures` if needed.
        run: |
          npm ci --no-audit --no-fund
          cd src/ui/client && npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
